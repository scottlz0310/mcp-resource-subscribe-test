services:
  mcp-resource-subscribe-test:
    build: .
    ports:
      - "${MCP_TEST_PORT:-8089}:${MCP_TEST_PORT:-8089}"
    environment:
      MCP_TEST_PORT: "${MCP_TEST_PORT:-8089}"
      MCP_TEST_PATH: "${MCP_TEST_PATH:-/mcp/subscribe-probe}"
      MCP_TEST_UPDATE_DELAY_SECONDS: "${MCP_TEST_UPDATE_DELAY_SECONDS:-5}"
      MCP_TEST_INITIAL_STATUS: "${MCP_TEST_INITIAL_STATUS:-pending}"
      MCP_TEST_UPDATED_STATUS: "${MCP_TEST_UPDATED_STATUS:-reviewed}"
      MCP_TEST_SEND_LIST_CHANGED: "${MCP_TEST_SEND_LIST_CHANGED:-false}"
      MCP_TEST_LOG_LEVEL: "${MCP_TEST_LOG_LEVEL:-debug}"
